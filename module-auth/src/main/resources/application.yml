spring:
  application:
    name: auth
  datasource:
    url: jdbc:mysql://localhost:3306/exam?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driverClassName: com.mysql.cj.jdbc.Driver
  redis:
    database: 8
    host: localhost
    port: 6379
    password:
  # 日志配置
  logging:
    level:
      # 打印MyBatis SQL日志
      exam.demo.moduleauth.mapper: debug
      # 打印JDBC日志
      java.sql: debug
      # 打印MyBatis框架日志
      org.apache.ibatis: debug
      # 打印事务日志
      org.springframework.jdbc: debug
  sql:
    init:
      enabled: false

server:
  port: 8770
  servlet:
    context-path: /auth
  #port: ${random.int[10000,65535]}

eureka:
  client:
    service-url:
      # defaultZone: http://118.31.7.229:8761/eureka
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
exam:
  machine-id: 1
  data-center-id: 110
  version: 1

mybatis-plus:
  mapper-locations: classpath:exam/demo/moduleauth/mapper/xml/*.xml
  type-aliases-package: exam.demo.moduleauth.pojo.model

# 每半小时确认一次在线用户
check:
  user: 0 0/30 * * * ?
